<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우주선 운석 피하기 (Space Dodge)</title>
    <!-- Tailwind CSS 사용 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030712;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* 네온 효과 */
        .neon-text-mint {
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.6), 0 0 20px rgba(52, 211, 153, 0.4);
        }
        .neon-text-yellow {
            text-shadow: 0 0 8px rgba(253, 224, 71, 0.6), 0 0 20px rgba(253, 224, 71, 0.4);
        }
        /* 화면 흔들림 효과 클래스 */
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-8px, -5px); }
            20% { transform: translate(8px, 5px); }
            30% { transform: translate(-6px, 8px); }
            40% { transform: translate(6px, -8px); }
            50% { transform: translate(-4px, 3px); }
            60% { transform: translate(4px, -3px); }
            70% { transform: translate(-2px, 1px); }
            80% { transform: translate(2px, -1px); }
            90% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body class="relative flex items-center justify-center">

    <!-- 게임 캔버스 영역 -->
    <div id="gameContainer" class="relative w-full h-full max-w-xl mx-auto overflow-hidden bg-slate-950 shadow-2xl">
        <canvas id="gameCanvas"></canvas>

        <!-- UI: 점수 및 시간 표시기 (상단) -->
        <div id="gameUI" class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center pointer-events-none select-none z-10">
            <!-- 시간 표시 -->
            <div class="bg-slate-900/80 backdrop-blur border border-slate-700/50 px-4 py-2 rounded-full flex items-center space-x-2">
                <span class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-ping"></span>
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">시간</span>
                <span id="timeVal" class="text-sm font-bold text-white font-mono">0.0초</span>
            </div>
            <!-- 점수 표시 -->
            <div class="bg-slate-900/80 backdrop-blur border border-slate-700/50 px-5 py-2 rounded-full flex items-center space-x-2">
                <span class="text-xs font-semibold text-yellow-400 uppercase tracking-wider">★ SCORE</span>
                <span id="scoreVal" class="text-lg font-black text-yellow-300 font-mono">0</span>
            </div>
        </div>

        <!-- 시작 화면 -->
        <div id="startScreen" class="absolute inset-0 bg-slate-950/90 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center z-20">
            <div class="mb-4">
                <span class="text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full border border-emerald-500/20 font-semibold tracking-widest uppercase">Space Adventure</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight mb-3">
                SPACE <span class="text-emerald-400 neon-text-mint">DODGE</span>
            </h1>
            <p class="text-slate-400 text-sm md:text-base max-w-sm mb-6 leading-relaxed">
                마우스나 터치 드래그로 네온 우주선을 조종하여 하늘에서 쏟아지는 운석을 피하고 노란색 <span class="text-yellow-400 font-semibold">별(★)</span>을 획득하세요!
            </p>

            <!-- 반응 속도(감도) 조절 패널 -->
            <div class="w-full max-w-xs mb-8 text-left bg-slate-900/80 border border-slate-800 p-4 rounded-2xl">
                <label class="block text-xs font-bold text-emerald-400 uppercase tracking-wider mb-2.5 text-center">우주선 이동 속도 (반응성)</label>
                <div class="grid grid-cols-4 gap-1 p-1 bg-slate-950 rounded-xl border border-slate-800">
                    <button type="button" data-speed="0.12" class="sens-btn py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition">슬로우</button>
                    <button type="button" data-speed="0.25" class="sens-btn py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition">기본</button>
                    <button type="button" data-speed="0.5" class="sens-btn py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition">빠름</button>
                    <button type="button" data-speed="1.0" class="sens-btn py-2 text-xs font-semibold rounded-lg text-slate-400 hover:text-white transition">즉시</button>
                </div>
            </div>

            <!-- 가이드 드로잉 -->
            <div class="flex items-center space-x-8 mb-8 text-slate-400 text-xs">
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800 mb-2">
                        <svg class="w-6 h-6 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19V5M5 12l7-7 7 7"/>
                        </svg>
                    </div>
                    <span>우주선 피하기 (운석)</span>
                </div>
                <div class="flex flex-col items-center">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-slate-900 border border-slate-800 mb-2">
                        <span class="text-2xl text-yellow-400 animate-bounce">★</span>
                    </div>
                    <span>별 획득 (+50점)</span>
                </div>
            </div>

            <button id="startBtn" class="w-full max-w-xs py-4 px-8 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold rounded-2xl shadow-lg shadow-emerald-500/20 active:scale-95 transition transform duration-150 text-lg uppercase tracking-wider">
                게임 시작하기
            </button>
        </div>

        <!-- 게임 오버 화면 -->
        <div id="gameOverScreen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center z-20 hidden">
            <div class="w-20 h-20 bg-red-500/10 border border-red-500/30 rounded-full flex items-center justify-center mb-6">
                <svg class="w-10 h-10 text-red-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            
            <h2 class="text-3xl font-black text-red-500 uppercase tracking-widest mb-2">GAME OVER</h2>
            <p class="text-slate-400 text-sm mb-6">운석과 충돌하여 우주선이 파괴되었습니다!</p>

            <!-- 결과 박스 -->
            <div class="grid grid-cols-2 gap-4 w-full max-w-xs mb-8 bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                <div class="text-center border-r border-slate-800">
                    <span class="text-xs text-slate-500 font-medium block mb-1">버틴 시간</span>
                    <span id="finalTime" class="text-xl font-bold text-white font-mono">0.0초</span>
                </div>
                <div class="text-center">
                    <span class="text-xs text-slate-500 font-medium block mb-1">최종 점수</span>
                    <span id="finalScore" class="text-xl font-black text-yellow-300 font-mono">0</span>
                </div>
            </div>

            <!-- 최고 기록 안내 -->
            <div id="newBestBadge" class="hidden mb-6 bg-yellow-500/10 text-yellow-400 text-xs px-4 py-1.5 rounded-full border border-yellow-500/20 font-bold uppercase tracking-wider animate-bounce">
                🎉 최고 기록 달성!
            </div>

            <!-- 다시하기 버튼 -->
            <button id="restartBtn" class="w-full max-w-xs py-4 px-8 bg-white hover:bg-slate-200 text-slate-950 font-bold rounded-2xl shadow-lg active:scale-95 transition transform duration-150 text-lg uppercase tracking-wider">
                다시 도전하기
            </button>
        </div>
    </div>

    <!-- 스크립트 작성 -->
    <script>
        // DOM 요소 가져오기
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreVal = document.getElementById('scoreVal');
        const timeVal = document.getElementById('timeVal');
        const finalTime = document.getElementById('finalTime');
        const finalScore = document.getElementById('finalScore');
        const newBestBadge = document.getElementById('newBestBadge');
        const sensButtons = document.querySelectorAll('.sens-btn');

        // 게임 상태 제어 변수들
        let isPlaying = false;
        let score = 0;
        let startTime = 0;
        let elapsedTime = 0;
        let lastTime = 0;
        let bestScore = localStorage.getItem('space_dodge_best') || 0;

        // 플레이어 우주선 정보 (기본 반응 속도는 0.25로 향상되었습니다)
        let savedSpeed = parseFloat(localStorage.getItem('space_dodge_speed')) || 0.25;

        const player = {
            x: 0,
            y: 0,
            width: 45,
            height: 45,
            targetX: 0, // 매끄러운 보간 이동을 위해 사용
            speed: savedSpeed // 보간(Lerp) 속도
        };

        // 감도 버튼 클릭 핸들러 및 초기화
        function initSensButtons() {
            sensButtons.forEach(btn => {
                const btnSpeed = parseFloat(btn.getAttribute('data-speed'));
                
                // 저장된 감도값에 맞춰 활성화 스타일 적용
                if (Math.abs(btnSpeed - player.speed) < 0.01) {
                    setActiveStyle(btn);
                }

                btn.addEventListener('click', () => {
                    const speed = parseFloat(btn.getAttribute('data-speed'));
                    player.speed = speed;
                    localStorage.setItem('space_dodge_speed', speed);
                    
                    // 스타일 갱신
                    sensButtons.forEach(b => setInactiveStyle(b));
                    setActiveStyle(btn);
                });
            });
        }

        function setActiveStyle(button) {
            button.classList.add('bg-emerald-500', 'text-slate-950', 'font-black');
            button.classList.remove('text-slate-400');
        }

        function setInactiveStyle(button) {
            button.classList.remove('bg-emerald-500', 'text-slate-950', 'font-black');
            button.classList.add('text-slate-400');
        }

        // 게임 엔티티 리스트
        let obstacles = []; // 운석들
        let items = [];      // 별 아이템들
        let stars = [];      // 배경 별들 (흘러가는 우주 효과)
        let particles = [];  // 아이템 획득 및 충돌 파티클

        // 게임 파라미터 (시간에 따라 점진적 증가)
        let obstacleSpawnRate = 1000; // 밀리초 단위 운석 스폰 주기
        let minObstacleSpeed = 3;
        let maxObstacleSpeed = 6;
        let lastObstacleSpawn = 0;
        let lastItemSpawn = 0;
        let itemSpawnRate = 3500; // 별 스폰 주기

        // 캔버스 크기 동적 조절 및 모바일 대응
        function resizeCanvas() {
            canvas.width = gameContainer.clientWidth;
            canvas.height = gameContainer.clientHeight;
            
            // 플레이어 초기 위치 설정 (바닥에서 일정 수준 위에 배치)
            if (!isPlaying) {
                player.x = canvas.width / 2;
                player.targetX = player.x;
                player.y = canvas.height - 80;
            } else {
                // 화면 리사이즈 시 플레이어 가두기 유지
                player.y = canvas.height - 80;
                player.x = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, player.x));
            }
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', () => {
            resizeCanvas();
            initStars(); // 배경에 우주 공간 별 초기 배치
            initSensButtons(); // 조작 감도 버튼 초기화
            requestAnimationFrame(gameLoop);
        });

        // 우주 배경의 작은 별들 초기화
        function initStars() {
            stars = [];
            const starCount = 60;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 1.5 + 0.5,
                    opacity: Math.random() * 0.7 + 0.3
                });
            }
        }

        // 입력 제어: 마우스와 터치 모두 일관되게 지원
        function getPointerX(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
            } else {
                clientX = e.clientX;
            }
            return clientX - rect.left;
        }

        function handlePointerMove(e) {
            if (!isPlaying) return;
            const pointerX = getPointerX(e);
            // 플레이어 타겟을 마우스/터치 위치로 잡음 (양옆 범위를 벗어나지 않도록 제어)
            player.targetX = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, pointerX));
        }

        // 터치 및 마우스 이벤트 바인딩
        canvas.addEventListener('mousemove', handlePointerMove);
        canvas.addEventListener('touchmove', handlePointerMove, { passive: true });
        canvas.addEventListener('touchstart', (e) => {
            if (!isPlaying) return;
            const pointerX = getPointerX(e);
            player.targetX = Math.max(player.width / 2, Math.min(canvas.width - player.width / 2, pointerX));
        }, { passive: true });


        // 게임 시작 및 초기화
        function startGame() {
            // 초기화
            score = 0;
            elapsedTime = 0;
            startTime = Date.now();
            lastTime = startTime;
            obstacles = [];
            items = [];
            particles = [];
            
            player.x = canvas.width / 2;
            player.targetX = player.x;
            player.y = canvas.height - 80;

            obstacleSpawnRate = 1000;
            minObstacleSpeed = 3;
            maxObstacleSpeed = 6;
            lastObstacleSpawn = 0;
            lastItemSpawn = 0;

            scoreVal.textContent = "0";
            timeVal.textContent = "0.0초";

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            isPlaying = true;
        }

        // 운석 객체 생성
        function spawnObstacle() {
            const size = Math.random() * 45 + 25; // 25px ~ 70px 크기의 다양한 운석
            // 비규칙적인 운석 모양새를 그리기 위해 내부 가상 버텍스 변형 데이터 추가
            const vertices = [];
            const vertexCount = 8 + Math.floor(Math.random() * 5);
            for (let i = 0; i < vertexCount; i++) {
                vertices.push(0.85 + Math.random() * 0.3); // 크기 변동율
            }

            obstacles.push({
                x: Math.random() * (canvas.width - size) + size / 2,
                y: -size,
                size: size,
                speed: Math.random() * (maxObstacleSpeed - minObstacleSpeed) + minObstacleSpeed,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.05,
                vertices: vertices
            });
        }

        // 노란 별 아이템 생성
        function spawnItem() {
            const size = 24;
            items.push({
                x: Math.random() * (canvas.width - size) + size / 2,
                y: -size,
                size: size,
                speed: Math.random() * 2 + 2,
                pulse: 0 // 애니메이션 맥박 효과용
            });
        }

        // 반짝임/파괴 입자(파티클) 생성기
        function createExplosion(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 1.5,
                    color: color,
                    alpha: 1,
                    decay: Math.random() * 0.03 + 0.015
                });
            }
        }

        // 화면 흔들림 시각 효과 유발
        function triggerScreenShake() {
            gameContainer.classList.add('shake');
            // 흔들림이 끝나면 클래스 제거하여 재사용 가능하게 처리
            setTimeout(() => {
                gameContainer.classList.remove('shake');
            }, 400);
        }

        // 게임 오버 처리
        function gameOver() {
            isPlaying = false;
            triggerScreenShake();

            // 파티클 폭발 효과 최대화
            createExplosion(player.x, player.y, '#34d399', 30); // 민트색 우주선 폭발
            createExplosion(player.x, player.y, '#ef4444', 20); // 붉은 파괴 불꽃

            // 지연 후 결과창 보이기
            setTimeout(() => {
                finalTime.textContent = elapsedTime.toFixed(1) + "초";
                finalScore.textContent = score;

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('space_dodge_best', score);
                    newBestBadge.classList.remove('hidden');
                } else {
                    newBestBadge.classList.add('hidden');
                }

                gameOverScreen.classList.remove('hidden');
            }, 800);
        }

        // 두 원 사이의 충돌 감지 함수
        function checkCollision(circle1, circle2) {
            const dx = circle1.x - circle2.x;
            const dy = circle1.y - circle2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < (circle1.radius + circle2.radius);
        }

        // 게임 루프
        function gameLoop(currentTime) {
            // 시간 계산
            const delta = currentTime - lastTime;
            lastTime = currentTime;

            // 캔버스 청소
            ctx.fillStyle = '#030712';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isPlaying) {
                elapsedTime = (Date.now() - startTime) / 1000;
                timeVal.textContent = elapsedTime.toFixed(1) + "초";

                // 난이도 상승 로직: 흐른 시간에 맞춰 운석 속도 및 빈도 증가시킴
                const difficultyMultiplier = Math.min(2.5, 1 + (elapsedTime / 25)); // 25초에 걸쳐 최대 2.5배 난이도로 수렴
                minObstacleSpeed = 3 * difficultyMultiplier;
                maxObstacleSpeed = 6 * difficultyMultiplier;
                obstacleSpawnRate = Math.max(300, 1000 - (elapsedTime * 20)); // 최대 300ms마다 생성

                // 운석 스폰 주기 계산
                if (currentTime - lastObstacleSpawn > obstacleSpawnRate) {
                    spawnObstacle();
                    lastObstacleSpawn = currentTime;
                }

                // 아이템 스폰 주기 계산
                if (currentTime - lastItemSpawn > itemSpawnRate) {
                    spawnItem();
                    lastItemSpawn = currentTime;
                }
            }

            // 1. 우주 배경 별 효과 드로잉 및 이동
            stars.forEach(star => {
                // 게임오버 시 배경 흐름 속도 감쇠
                const currentSpeed = isPlaying ? star.speed : star.speed * 0.1;
                star.y += currentSpeed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // 2. 파티클 물리 적용 및 드로잉
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // 3. 플레이어(우주선) 드로잉 및 부드러운 조종
            if (isPlaying) {
                // 부드러운 조작 및 반응성 설정을 반영한 선형 보간(Lerp) 적용
                player.x += (player.targetX - player.x) * player.speed;

                ctx.save();
                ctx.translate(player.x, player.y);

                // 우주선 네온 이펙트 광원 세팅
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#10b981';

                // 네온 민트 우주선 SVG 드로잉
                ctx.strokeStyle = '#34d399';
                ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
                ctx.lineWidth = 3.5;
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(0, -player.height / 2); // 콕핏 상단 끝
                ctx.lineTo(player.width / 2, player.height / 3); // 우측 날개 밑단
                ctx.lineTo(player.width / 4, player.height / 2); // 우측 버니어부
                ctx.lineTo(-player.width / 4, player.height / 2); // 좌측 버니어부
                ctx.lineTo(-player.width / 2, player.height / 3); // 좌측 날개 밑단
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 우주선 디테일 데코 라인
                ctx.strokeStyle = '#e2fcf1';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, -player.height / 3);
                ctx.lineTo(0, player.height / 4);
                ctx.stroke();

                // 배기 엔진 화염 이펙트 (네온 옐로우)
                ctx.shadowColor = '#facc15';
                ctx.fillStyle = '#facc15';
                const flameHeight = Math.random() * 12 + 6;
                ctx.beginPath();
                ctx.moveTo(-player.width / 6, player.height / 2);
                ctx.lineTo(0, (player.height / 2) + flameHeight);
                ctx.lineTo(player.width / 6, player.height / 2);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            // 4. 별 아이템 물리/그리기 루프
            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                if (isPlaying) {
                    item.y += item.speed;
                }

                // 펄스 애니메이션 크기 변조
                item.pulse += 0.08;
                const bonusSize = Math.sin(item.pulse) * 3;

                // 스크린 이탈 감지 시 삭제
                if (item.y - item.size > canvas.height) {
                    items.splice(i, 1);
                    continue;
                }

                // 별 아이템 그리기 (노란색 별)
                ctx.save();
                ctx.translate(item.x, item.y);
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#facc15';
                ctx.fillStyle = '#fcd34d';
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;

                const rot = Math.PI / 2 * 3;
                const spikes = 5;
                const outerRadius = item.size / 2 + bonusSize;
                const innerRadius = (item.size / 2 + bonusSize) / 2;
                let cx = 0, cy = 0;
                let step = Math.PI / spikes;

                ctx.beginPath();
                ctx.moveTo(0, -outerRadius);
                for (let k = 0; k < spikes; k++) {
                    cx = Math.cos(rot + k * step * 2) * outerRadius;
                    cy = Math.sin(rot + k * step * 2) * outerRadius;
                    ctx.lineTo(cx, cy);
                    cx = Math.cos(rot + k * step * 2 + step) * innerRadius;
                    cy = Math.sin(rot + k * step * 2 + step) * innerRadius;
                    ctx.lineTo(cx, cy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();

                // 우주선과의 아이템 획득 충돌 연산
                if (isPlaying) {
                    const playerCircle = { x: player.x, y: player.y, radius: player.width / 2 - 5 };
                    const itemCircle = { x: item.x, y: item.y, radius: item.size / 2 };

                    if (checkCollision(playerCircle, itemCircle)) {
                        score += 50;
                        scoreVal.textContent = score;

                        // 아이템 획득 이펙트 파티클 생성
                        createExplosion(item.x, item.y, '#facc15', 15);
                        
                        // 화면 상단 일시적 텍스트 애니메이션 유도 효과를 위해 파티클 처리
                        items.splice(i, 1);
                    }
                }
            }

            // 5. 운석 물리/그리기 루프
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                if (isPlaying) {
                    obs.y += obs.speed;
                    obs.rotation += obs.rotationSpeed;
                }

                // 스크린을 넘어가면 삭제 및 보너스 점수 가산
                if (obs.y - obs.size > canvas.height) {
                    if (isPlaying) {
                        score += 10; // 운석을 한 개 피할 때마다 10점씩 상승
                        scoreVal.textContent = score;
                    }
                    obstacles.splice(i, 1);
                    continue;
                }

                // 갈색 회색 울퉁불퉁한 운석 렌더링
                ctx.save();
                ctx.translate(obs.x, obs.y);
                ctx.rotate(obs.rotation);

                // 어두운 운석 윤곽 그림자 효과
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';

                // 울퉁불퉁한 운석 그리기
                ctx.fillStyle = '#6b5a4f'; // 메인 갈색
                ctx.strokeStyle = '#4a3d35'; // 짙은 갈색 테두리
                ctx.lineWidth = 3;

                ctx.beginPath();
                const radius = obs.size / 2;
                const points = obs.vertices.length;
                for (let k = 0; k < points; k++) {
                    const angle = (k / points) * Math.PI * 2;
                    const r = radius * obs.vertices[k];
                    const vx = Math.cos(angle) * r;
                    const vy = Math.sin(angle) * r;
                    if (k === 0) ctx.moveTo(vx, vy);
                    else ctx.lineTo(vx, vy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 운석 표면 분화구 디자인 디테일 묘사
                ctx.fillStyle = '#4a3d35'; // 크레이터 어두운 채우기
                const craterRadius = radius * 0.2;
                ctx.beginPath();
                ctx.arc(-radius * 0.3, -radius * 0.1, craterRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(radius * 0.2, radius * 0.3, craterRadius * 0.7, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();

                // 우주선과의 운석 충돌 처리 연산
                if (isPlaying) {
                    // 판정을 우주선 모양에 맞춰 다소 타이트하게 보정
                    const playerCircle = { x: player.x, y: player.y, radius: player.width / 3.2 };
                    const obsCircle = { x: obs.x, y: obs.y, radius: obs.size / 2.2 };

                    if (checkCollision(playerCircle, obsCircle)) {
                        gameOver();
                    }
                }
            }

            // 지속적으로 프레임 그리기
            requestAnimationFrame(gameLoop);
        }

        // 이벤트 리스너 연결
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 마우스 및 모바일 가상 바인딩 예방
        window.addEventListener('keydown', (e) => {
            // 편의 기능: 스페이스바로 재도전 또는 시작 가능
            if (e.code === 'Space') {
                if (!isPlaying) {
                    startGame();
                }
            }
        });
    </script>
</body>
